<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntrix Consumer Analytics Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <!-- SIDEBAR NAVIGATION STEP INDICATORS -->
  <div class="sidebar">
    <div class="logo">
      SYNTRIX
    </div>
    <div class="steps">
      <div class="step active">Financial</div>
      <div class="step">Checkout</div>
      <div class="step">Discovery</div>
      <div class="step">Psychology</div>
      <div class="step">Categories</div>
      <div class="step">Rewards</div>
      <div class="step">Experience</div>
    </div>
  </div>

  <!-- MAIN OPERATIONAL CORE CONTENT -->
  <div class="content">
    
    <!-- TOPBAR METRICS AND TRANSLATION INTERFACE -->
    <div class="topbar">
      <div>
        <h1 id="mainTitle">
          Syntrix Consumer Analytics Hub
        </h1>
        <p class="subtitle" id="mainSubtitle">
          Complete all 7 consumer research modules to claim your 10 SYNX token rewards.
        </p>
      </div>

      <div class="languageBox">
        <select id="languageSelect">
          <option value="en">English</option>
          <option value="hi">हिन्दी</option>
        </select>
      </div>

      <div class="progressBox">
        <div class="progressText">Progress 1/7</div>
        <div class="progressBar">
          <div class="progressFill" style="width: 14.28%;"></div>
        </div>
      </div>
    </div>

    <!-- CORE TRANSACTION FORM DATA ARCHITECTURE -->
    <form id="claimForm">
      
      <!-- SURVEY RENDER MOUNT DOM -->
      <div id="surveyContainer"></div>

      <!-- INTERFACE NAV BUTTON PAIR CONTROLS -->
      <div class="navButtons">
        <button type="button" id="prevBtn" class="navBtn">
          Previous
        </button>
        <button type="button" id="nextBtn" class="navBtn">
          Next
        </button>
      </div>

      <!-- FINAL COMPLIANCE CREDENTIAL WALLET SUBMISSION -->
      <div id="submitSection" class="hidden">
        <h2 class="submitTitle" id="submitTitle">
          Rewards Routing Node Authentication
        </h2>
        
        <input 
          type="email" 
          id="email" 
          placeholder="User Communication Profile (Email Address)" 
          required
        >
        
        <input 
          type="text" 
          id="walletAddress" 
          placeholder="EVM Recipient Destination Node (Wallet Address)" 
          required
        >
        
        <button type="submit" class="submitBtn" id="submitBtn">
          Authorize Matrix & Claim 10 SYNX
        </button>
      </div>
    </form>

    <!-- SERVER SYSTEM STATUS MESSAGES FEEDBACK -->
    <div id="status"></div>
  </div>
</div>

<!-- ================= ENGINE EXECUTION LOAD STACK LAYER ================= -->
<script src="data.js"></script>
<script src="translation.js"></script>
<script src="script.js"></script>

</body>
</html>
