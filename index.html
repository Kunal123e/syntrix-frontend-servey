<div class="topbar">

  <div>
    <h1>
      Syntrix Consumer Analytics Hub
    </h1>

    <p>
      Complete all 7 consumer research modules
      to claim your 10 SYNX token rewards.
    </p>

    <h2>
      Rewards Routing Node Authentication
    </h2>

    <input
      type="email"
      id="email"
      placeholder="User Communication Profile (Email Address)"
      required
    >

    <input
      type="text"
      id="walletAddress"
      placeholder="EVM Recipient Destination Node (Wallet Address)"
      required
    >

    <button type="submit" class="submitBtn">
      Authorize Matrix & Claim 10 SYNX
    </button>

  </div>

</form>
